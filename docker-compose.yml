services:
  postgres:
    image: postgres:15
    container_name: miacaomigo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: miacaomigo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01_DB/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data: